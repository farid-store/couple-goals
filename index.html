<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac & Chat Matchmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: { brand: { pink: '#ff7eb3', violet: '#7a28cb' } }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
        }
        /* Custom Scrollbar untuk hasil */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen text-gray-800">

    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-600 mb-3 drop-shadow-sm">
                <i class="fa-solid fa-heart-pulse mr-2"></i>AI Matchmaker
            </h1>
            <p class="text-gray-600 text-lg">Prediksi kecocokanmu berdasarkan Umur, Zodiak & Gaya Chatting!</p>
        </div>

        <div class="glass-panel rounded-3xl shadow-xl border border-white p-6 md:p-10">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="relative bg-white/60 p-6 rounded-2xl border border-indigo-100 shadow-sm transition hover:shadow-md">
                    <div class="absolute -top-4 left-6 bg-indigo-500 text-white px-4 py-1 rounded-full text-sm font-semibold shadow-sm">
                        <i class="fa-solid fa-mars mr-1"></i> Pria
                    </div>
                    <div class="mt-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
                            <input type="text" id="name1" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition" placeholder="Misal: Farid Siddiq">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir</label>
                            <input type="date" id="dob1" onchange="updateLiveStats(1)" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none transition text-gray-600">
                        </div>
                        <div id="stats1" class="hidden flex items-center justify-between text-sm bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-medium">
                            <span id="age1_text"><i class="fa-solid fa-cake-candles mr-1"></i> - thn</span>
                            <span id="zodiac1_text"><i class="fa-solid fa-star mr-1"></i> -</span>
                        </div>
                    </div>
                </div>

                <div class="relative bg-white/60 p-6 rounded-2xl border border-pink-100 shadow-sm transition hover:shadow-md">
                    <div class="absolute -top-4 left-6 bg-pink-500 text-white px-4 py-1 rounded-full text-sm font-semibold shadow-sm">
                        <i class="fa-solid fa-venus mr-1"></i> Wanita
                    </div>
                    <div class="mt-4 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama</label>
                            <input type="text" id="name2" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition" placeholder="Misal: Dinda">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir</label>
                            <input type="date" id="dob2" onchange="updateLiveStats(2)" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none transition text-gray-600">
                        </div>
                        <div id="stats2" class="hidden flex items-center justify-between text-sm bg-pink-50 text-pink-700 px-4 py-2 rounded-lg font-medium">
                            <span id="age2_text"><i class="fa-solid fa-cake-candles mr-1"></i> - thn</span>
                            <span id="zodiac2_text"><i class="fa-solid fa-star mr-1"></i> -</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Bukti Chat (Sangat Disarankan agar AI akurat!)</label>
                <div class="relative border-2 border-dashed border-gray-300 rounded-2xl p-6 bg-gray-50/50 hover:bg-gray-100 transition group cursor-pointer text-center" onclick="document.getElementById('chatImage').click()">
                    
                    <input type="file" id="chatImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                    
                    <div id="uploadPrompt" class="space-y-2">
                        <div class="w-12 h-12 mx-auto bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center text-xl group-hover:scale-110 transition">
                            <i class="fa-regular fa-image"></i>
                        </div>
                        <p class="text-sm text-gray-500 font-medium">Klik untuk upload *screenshot* chat WhatsApp/DM</p>
                        <p class="text-xs text-gray-400">JPG, PNG, maksimal 5MB</p>
                    </div>

                    <div id="imagePreviewContainer" class="hidden flex flex-col items-center">
                        <img id="imagePreview" class="max-h-48 rounded-lg shadow-md mb-2 object-contain" src="" alt="Preview">
                        <button type="button" onclick="removeImage(event)" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full font-medium hover:bg-red-200 transition">
                            <i class="fa-solid fa-trash mr-1"></i> Ganti Gambar
                        </button>
                    </div>
                </div>
            </div>

            <button id="analyzeBtn" class="w-full relative overflow-hidden bg-gradient-to-r from-indigo-600 to-pink-500 hover:from-indigo-700 hover:to-pink-600 text-white font-bold text-lg py-4 px-6 rounded-2xl shadow-lg transform transition-all hover:scale-[1.02] active:scale-95 flex justify-center items-center">
                <span id="btnText"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i> Analisis Kecocokan Sekarang</span>
                <div id="loadingIcon" class="hidden flex items-center">
                    <svg class="animate-spin -ml-1 mr-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Sedang Membaca Pikiran...
                </div>
            </button>

            <div id="resultContainer" class="hidden mt-8 opacity-0 transition-opacity duration-500">
                <div class="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-t-2xl p-4 text-center">
                    <h3 class="text-xl font-bold text-white"><i class="fa-solid fa-file-contract mr-2"></i> Hasil Analisis AI</h3>
                </div>
                <div class="bg-white border-x border-b border-gray-200 rounded-b-2xl p-6 md:p-8 shadow-inner">
                    <div id="resultContent" class="prose prose-lg prose-indigo max-w-none text-gray-700 leading-relaxed">
                        </div>
                </div>
            </div>

        </div>
        
        <p class="text-center text-gray-400 text-sm mt-8">
            Ditenagai oleh Gemini AI <i class="fa-solid fa-bolt text-yellow-400"></i>
        </p>
    </div>

    <script>
        // --- LOGIKA HELPER ---
        function calculateAge(dobString) {
            const today = new Date();
            const birthDate = new Date(dobString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
            return age;
        }

        function getZodiac(dobString) {
            const date = new Date(dobString);
            const day = date.getDate();
            const month = date.getMonth() + 1;
            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Aries ♈";
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Taurus ♉";
            if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Gemini ♊";
            if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Cancer ♋";
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Leo ♌";
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Virgo ♍";
            if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Libra ♎";
            if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Scorpio ♏";
            if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Sagitarius ♐";
            if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "Capricorn ♑";
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Aquarius ♒";
            if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Pisces ♓";
            return "Unknown";
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // --- UI INTERAKTIF ---
        // Menampilkan Umur & Zodiak secara realtime saat tanggal dipilih
        window.updateLiveStats = function(personId) {
            const dobVal = document.getElementById(`dob${personId}`).value;
            const statsDiv = document.getElementById(`stats${personId}`);
            
            if (dobVal) {
                const age = calculateAge(dobVal);
                const zodiac = getZodiac(dobVal);
                document.getElementById(`age${personId}_text`).innerHTML = `<i class="fa-solid fa-cake-candles mr-1"></i> ${age} Tahun`;
                document.getElementById(`zodiac${personId}_text`).innerHTML = zodiac;
                statsDiv.classList.remove('hidden');
            } else {
                statsDiv.classList.add('hidden');
            }
        }

        // Menampilkan Preview Gambar
        window.previewImage = function(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('uploadPrompt').classList.add('hidden');
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Menghapus Gambar Preview
        window.removeImage = function(event) {
            event.stopPropagation(); // Cegah trigger klik file input
            document.getElementById('chatImage').value = "";
            document.getElementById('imagePreview').src = "";
            document.getElementById('uploadPrompt').classList.remove('hidden');
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        // --- EKSEKUSI API ---
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const name1 = document.getElementById('name1').value || 'Pria';
            const dob1 = document.getElementById('dob1').value;
            const name2 = document.getElementById('name2').value || 'Wanita';
            const dob2 = document.getElementById('dob2').value;
            const imageFile = document.getElementById('chatImage').files[0];

            // Validasi menggunakan SweetAlert2
            if (!dob1 || !dob2) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Tunggu Dulu!',
                    text: 'Tanggal lahir kamu dan dia wajib diisi ya biar zodiaknya ketahuan.',
                    confirmButtonColor: '#7a28cb'
                });
                return;
            }

            const age1 = calculateAge(dob1);
            const zodiac1 = getZodiac(dob1);
            const age2 = calculateAge(dob2);
            const zodiac2 = getZodiac(dob2);

            // Handle UI Loading State
            const analyzeBtn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');

            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-95');
            btnText.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            
            // Sembunyikan hasil lama jika ada
            resultContainer.classList.add('hidden');
            resultContainer.classList.remove('opacity-100');

            try {
                // Prompt engineering disesuaikan agar format output lebih kekinian
                let parts = [
                    {
                        "text": `Kamu adalah AI Relationship Expert yang gaul dan insightful. 
                        Analisis kecocokan pasangan ini:
                        Pria: Nama ${name1}, ${age1} tahun, Zodiak ${zodiac1}.
                        Wanita: Nama ${name2}, ${age2} tahun, Zodiak ${zodiac2}.
                        
                        ${imageFile ? "Saya melampirkan screenshot chat mereka. Baca isi percakapannya (siapa yang effort, gaya bahasa, keasikan) dan jadikan itu faktor penentu skor!" : "Tidak ada screenshot chat, gunakan logika astrologi dan perbedaan umur murni."}
                        
                        Gunakan format HTML dasar (<b>, <p>, <ul>, <li>, <br>). Jangan gunakan markdown \`\`\`html.
                        Struktur wajib:
                        1. Berikan "Skor Kecocokan: XX%" dengan ukuran font besar (gunakan <h3>).
                        2. <b>Vibe Hubungan:</b> (Satu kalimat rangkuman).
                        3. <b>Kenapa Kalian Cocok:</b> (Penjelasan zodiak/umur/chat).
                        4. <b>Potensi Drama:</b> (Apa yang biasanya bikin berantem).
                        5. <b>Saran Pakar:</b> (Tips menjalin hubungan).`
                    }
                ];

                if (imageFile) {
                    const base64Image = await fileToBase64(imageFile);
                    parts.push({
                        "inline_data": {
                            "mime_type": imageFile.type,
                            "data": base64Image
                        }
                    });
                }

                // Hit Vercel API lokal
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{ "parts": parts }]
                    })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                const aiResponseText = data.candidates[0].content.parts[0].text;
                const cleanHTML = aiResponseText.replace(/```html/g, '').replace(/```/g, '');
                
                // Tampilkan hasil dengan animasi fade in
                resultContent.innerHTML = cleanHTML;
                resultContainer.classList.remove('hidden');
                
                // Trigger reflow untuk animasi opacity
                void resultContainer.offsetWidth; 
                resultContainer.classList.add('opacity-100');

                // Auto-scroll pelan-pelan ke hasil
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error(error);
                Swal.fire({
                    icon: 'error',
                    title: 'Oops, API Ngambek!',
                    text: error.message || 'Terjadi kesalahan sistem.',
                    confirmButtonColor: '#ff7eb3'
                });
            } finally {
                // Kembalikan tombol ke semula
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-95');
                btnText.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
