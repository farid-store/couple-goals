<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zodiac & Chat Matchmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="max-w-3xl mx-auto py-10 px-4">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-indigo-600 p-6 text-center">
                <h1 class="text-3xl font-bold text-white">💖 Zodiak & Chat Matchmaker</h1>
                <p class="text-indigo-200 mt-2">Cek kecocokan berdasarkan Umur, Zodiak, dan Gaya Chatting!</p>
            </div>

            <div class="p-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4 bg-blue-50 p-4 rounded-lg">
                        <h2 class="text-lg font-semibold text-blue-800 border-b border-blue-200 pb-2">Data Pria</h2>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nama</label>
                            <input type="text" id="name1" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Nama Kamu">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tanggal Lahir</label>
                            <input type="date" id="dob1" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md">
                        </div>
                    </div>

                    <div class="space-y-4 bg-pink-50 p-4 rounded-lg">
                        <h2 class="text-lg font-semibold text-pink-800 border-b border-pink-200 pb-2">Data Wanita</h2>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nama</label>
                            <input type="text" id="name2" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md" placeholder="Nama Si Dia">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Tanggal Lahir</label>
                            <input type="date" id="dob2" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md">
                        </div>
                    </div>
                </div>

                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center bg-gray-50 hover:bg-gray-100 transition">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload Screenshot Chat (Opsional/Sangat Disarankan)</label>
                    <input type="file" id="chatImage" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer">
                </div>

                <button id="analyzeBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center shadow-md">
                    <span id="btnText">Analisis Kecocokan Sekarang 🚀</span>
                    <svg id="loadingIcon" class="animate-spin hidden ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>

                <div id="resultContainer" class="hidden mt-6 bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Hasil Prediksi Kecocokan</h3>
                    <div id="resultContent" class="prose prose-indigo max-w-none text-gray-700"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI API ---
        const API_KEY = "";
        // Catatan: Jika versi gemini-2.5-flash mengalami error "model not found" di console, 
        // silakan ubah string di bawah ini kembali menjadi "gemini-1.5-flash".
        const MODEL_NAME = "gemini-2.5-flash"; 
        
        // Fungsi Hitung Umur
        function calculateAge(dobString) {
            const today = new Date();
            const birthDate = new Date(dobString);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        // Fungsi Tentukan Zodiak
        function getZodiac(dobString) {
            const date = new Date(dobString);
            const day = date.getDate();
            const month = date.getMonth() + 1;

            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Aries";
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Taurus";
            if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Gemini";
            if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Cancer";
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Leo";
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Virgo";
            if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Libra";
            if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Scorpio";
            if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Sagitarius";
            if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "Capricorn";
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Aquarius";
            if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "Pisces";
            return "Unknown";
        }

        // Fungsi Convert Image ke Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // Event Listener Tombol Analisis
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const name1 = document.getElementById('name1').value || 'Pria';
            const dob1 = document.getElementById('dob1').value;
            const name2 = document.getElementById('name2').value || 'Wanita';
            const dob2 = document.getElementById('dob2').value;
            const imageFile = document.getElementById('chatImage').files[0];

            if (!dob1 || !dob2) {
                alert("Mohon isi kedua Tanggal Lahir terlebih dahulu!");
                return;
            }

            const age1 = calculateAge(dob1);
            const zodiac1 = getZodiac(dob1);
            const age2 = calculateAge(dob2);
            const zodiac2 = getZodiac(dob2);

            // UI Loading State
            const analyzeBtn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');

            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerText = "Sedang Membaca Pikiran & Chat...";
            loadingIcon.classList.remove('hidden');
            resultContainer.classList.add('hidden');

            try {
                let parts = [
                    {
                        "text": `Kamu adalah AI Pakar Hubungan (Relationship Expert). 
                        Tolong analisis kecocokan pasangan ini berdasarkan data berikut:
                        Pihak Pria: Nama ${name1}, Umur ${age1} tahun, Zodiak ${zodiac1}.
                        Pihak Wanita: Nama ${name2}, Umur ${age2} tahun, Zodiak ${zodiac2}.
                        
                        Gunakan pengetahuan psikologi berdasarkan umur dan sifat astrologi zodiak mereka.
                        ${imageFile ? "Saya melampirkan screenshot chat mereka. Analisis gaya komunikasi dari gambar tersebut (siapa yang dominan, asik, atau cuek) dan jadikan faktor utama penilaian." : "Tidak ada screenshot chat, fokus pada umur dan zodiak."}
                        
                        Berikan output terstruktur menggunakan tag HTML dasar (<b>, <p>, <ul>, <li>, <h3>, <br>).
                        Berikan skor kecocokan dalam persen di awal kalimat, lalu jabarkan: 1) Alasan Kecocokan, 2) Potensi Masalah, 3) Saran Hubungan.`
                    }
                ];

                if (imageFile) {
                    const base64Image = await fileToBase64(imageFile);
                    parts.push({
                        "inline_data": {
                            "mime_type": imageFile.type,
                            "data": base64Image
                        }
                    });
                }

                // Hit endpoint API langsung dengan Model dan Key yang sudah ditanam
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{ "parts": parts }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                // Membersihkan markdown wrapper jika AI membandel
                const cleanHTML = aiResponseText.replace(/```html/g, '').replace(/```/g, '');
                
                resultContent.innerHTML = cleanHTML;
                resultContainer.classList.remove('hidden');

            } catch (error) {
                alert("Waduh, terjadi kesalahan saat menghubungi API: " + error.message);
                console.error(error);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.innerText = "Analisis Kecocokan Sekarang 🚀";
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
